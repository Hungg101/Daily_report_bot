services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daily_report_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_report_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: daily-report-telegram-bot:local
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/daily_report_bot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_REPORT_TIME_ZONE: ${APP_REPORT_TIME_ZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
