<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Report Mini App</title>
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="./app.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            --bg: var(--tg-theme-bg-color, #f7f8f4);
            --surface: var(--tg-theme-secondary-bg-color, #ffffff);
            --surface-soft: rgba(31, 143, 104, 0.08);
            --text: var(--tg-theme-text-color, #202321);
            --muted: var(--tg-theme-hint-color, #69716c);
            --accent: var(--tg-theme-button-color, #1f8f68);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --border: rgba(45, 52, 47, 0.16);
            --danger: #b23b3b;
            --warning: #a65f1b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app {
            width: min(100%, 760px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 18px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
        }

        .topbar,
        .form,
        .footer {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .topbar {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .identity {
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .date-pill {
            min-width: 112px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }

        .form {
            padding: 16px;
            display: grid;
            gap: 14px;
            align-content: start;
        }

        label {
            font-size: 14px;
            font-weight: 650;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 13px 14px;
            background: transparent;
            color: var(--text);
            font: inherit;
            line-height: 1.5;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .templates {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            min-height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 13px;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-weight: 650;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .template-button {
            background: var(--surface-soft);
        }

        .primary {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--accent-text);
        }

        .footer {
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .status.error {
            color: var(--danger);
        }

        .status.warning {
            color: var(--warning);
        }

        @media (max-width: 560px) {
            .app {
                padding: 12px;
            }

            .topbar,
            .footer {
                grid-template-columns: 1fr;
            }

            .date-pill {
                width: 100%;
            }

            .footer button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<noscript>Mini app cần bật JavaScript.</noscript>
</body>
</html>
