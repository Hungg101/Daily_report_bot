<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Report Mini App</title>
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="./app.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            --page-start: #f6f8ff;
            --page-mid: #eefaf6;
            --page-end: #fff5f7;
            --surface: rgba(255, 255, 255, 0.76);
            --surface-strong: rgba(255, 255, 255, 0.92);
            --text: var(--tg-theme-text-color, #172033);
            --muted: var(--tg-theme-hint-color, #6a7282);
            --accent: var(--tg-theme-button-color, #007aff);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --blue: #007aff;
            --green: #34c759;
            --pink: #ff2d55;
            --orange: #ff9500;
            --border: rgba(24, 35, 56, 0.12);
            --shadow: 0 18px 40px rgba(31, 45, 71, 0.13);
            --danger: #d70015;
            --warning: #bf5b00;
            --success: #208a3c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(160deg, var(--page-start) 0%, var(--page-mid) 48%, var(--page-end) 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
        }

        .app {
            width: min(100%, 760px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 18px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
        }

        .topbar,
        .form,
        .footer {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        .topbar {
            padding: 18px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .topbar::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, var(--blue), var(--green), var(--pink), var(--orange));
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 750;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .identity {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .meta {
            display: grid;
            gap: 8px;
            justify-items: end;
        }

        .date-pill,
        .runtime-pill {
            max-width: 220px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.52);
            font-size: 13px;
            text-align: center;
            line-height: 1.25;
        }

        .runtime-pill {
            color: var(--accent);
            font-weight: 700;
        }

        .form {
            padding: 18px;
            display: grid;
            gap: 14px;
            align-content: start;
        }

        .form-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: baseline;
        }

        label {
            font-size: 14px;
            font-weight: 750;
        }

        .count {
            color: var(--muted);
            font-size: 13px;
        }

        textarea {
            width: 100%;
            min-height: 260px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            background: var(--surface-strong);
            color: var(--text);
            font: inherit;
            font-size: 16px;
            line-height: 1.5;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow:
                0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.55);
        }

        .templates {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            min-height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 13px;
            background: rgba(255, 255, 255, 0.68);
            color: var(--text);
            font: inherit;
            font-weight: 750;
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
        }

        button:hover:not(:disabled) {
            border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
            box-shadow: 0 8px 18px rgba(31, 45, 71, 0.12);
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .template-button {
            border: 0;
            color: #111827;
        }

        .template-button:nth-child(1) {
            background: color-mix(in srgb, var(--green) 18%, white);
        }

        .template-button:nth-child(2) {
            background: color-mix(in srgb, var(--blue) 16%, white);
        }

        .template-button:nth-child(3) {
            background: color-mix(in srgb, var(--pink) 14%, white);
        }

        .primary {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--accent-text);
            box-shadow: 0 12px 22px color-mix(in srgb, var(--accent) 28%, transparent);
        }

        .footer {
            padding: 14px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }

        .status.warning {
            color: var(--warning);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-start: #171a22;
                --page-mid: #121c20;
                --page-end: #221820;
                --surface: rgba(37, 44, 56, 0.78);
                --surface-strong: rgba(30, 36, 48, 0.92);
                --text: var(--tg-theme-text-color, #f7f8fb);
                --muted: var(--tg-theme-hint-color, #9ba6b8);
                --border: rgba(255, 255, 255, 0.12);
                --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
                --success: #5de878;
                --warning: #ffb340;
            }

            .date-pill,
            .runtime-pill,
            button {
                background: rgba(255, 255, 255, 0.08);
            }

            .template-button {
                color: #f7f8fb;
            }

            .template-button:nth-child(1) {
                background: color-mix(in srgb, var(--green) 26%, rgba(255, 255, 255, 0.06));
            }

            .template-button:nth-child(2) {
                background: color-mix(in srgb, var(--blue) 28%, rgba(255, 255, 255, 0.06));
            }

            .template-button:nth-child(3) {
                background: color-mix(in srgb, var(--pink) 26%, rgba(255, 255, 255, 0.06));
            }
        }

        @media (max-width: 560px) {
            .app {
                padding: 12px;
            }

            .topbar,
            .footer {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 26px;
            }

            .meta {
                justify-items: stretch;
            }

            .date-pill {
                width: 100%;
                max-width: none;
            }

            .footer button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<noscript>Mini app cần bật JavaScript.</noscript>
</body>
</html>
